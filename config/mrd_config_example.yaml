# MRD Configuration Example
# Copy and customize this file to configure MRD generation

# Global MRD Properties Configuration
report_actions:
  - "RedfishEvent"
  - "LogToMetricReportsCollection"

report_updates: "Overwrite"
append_limit: 100
heartbeat_interval: "PT0S"  # No heartbeat by default
recurrence_interval: "PT60S"  # 60 seconds

# Per-Metric-Type Customization
metric_type_configs:
  EnvironmentMetrics:
    recurrence_interval: "PT30S"  # 30 seconds for environmental data
    heartbeat_interval: "PT5M"    # 5 minute heartbeat
  
  ProcessorMetrics:
    recurrence_interval: "PT10S"  # 10 seconds for performance data
    report_actions: ["RedfishEvent"]
  
  AlarmsMetrics:
    report_updates: "AppendStopsWhenFull"
    append_limit: 500

# Custom MetricId Mappings
metric_mappings:
  # Temperature sensor mappings (updated for underscore format)
  "Temp_CPU0_Temperature": "CPU0_CoreTemperature"
  "Temp_Inlet_Temperature": "SystemInletTemperature"
  "Temp_PSU_HOTSPOT_Temperature": "PSU_HotspotTemperature"
  
  # Fan mappings (updated for underscore format)
  "Fan_1A_FanSpeed": "SystemFan_1A_Speed"
  "Fan_PSU_1_FanSpeed": "PSU_Fan_1_Speed"
  
  # Memory temperature mappings using patterns (updated for underscore format)
  "Temp_DIMM_A_Temperature": "Memory_DIMM_A_Temperature"
  "Temp_DIMM_B_Temperature": "Memory_DIMM_B_Temperature"
  "Temp_DIMM_C_Temperature": "Memory_DIMM_C_Temperature"
  
  # Pattern-based mappings for systematic naming (updated for underscore format)
  "Temp_VR_*_Temperature": "VoltageRegulator_{source_id}_Temperature"
  "Pwm_PSU_Fan_*_FanSpeed": "PSU_Fan_{source_id}_PWM"

# Custom MetricProperties Mappings
metric_properties_mappings:
  # Map to specific Redfish URIs
  "CPU0_CoreTemperature":
    - "/redfish/v1/Systems/1/Processors/CPU0/Metrics#TemperatureCelsius"
  
  "SystemInletTemperature":
    - "/redfish/v1/Chassis/1/ThermalSubsystem/Sensors/InletTemp#ReadingCelsius"
  
  "SystemFan_1A_Speed":
    - "/redfish/v1/Chassis/1/ThermalSubsystem/Fans/1A#SpeedRPM"
    - "/redfish/v1/Chassis/1/ThermalSubsystem/Fans/1A#SpeedPercent"
  
  # Memory metrics with multiple properties
  "Memory_DIMM_A_Temperature":
    - "/redfish/v1/Systems/1/Memory/DIMM_A/Metrics#TemperatureCelsius"
    - "/redfish/v1/Systems/1/Memory/DIMM_A#Status/Health"