{% extends "base.html" %}

{% block title %}{{ title }} - Documentation{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
<style>
    .markdown-content {
        line-height: 1.6;
    }
    
    .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        margin-top: 2rem;
        margin-bottom: 1rem;
    }
    
    .markdown-content h1 {
        border-bottom: 2px solid #e9ecef;
        padding-bottom: 0.5rem;
    }
    
    .markdown-content h2 {
        border-bottom: 1px solid #e9ecef;
        padding-bottom: 0.3rem;
    }
    
    .markdown-content pre {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 0.375rem;
        padding: 1rem;
        overflow-x: auto;
    }
    
    .markdown-content code:not(pre code) {
        background-color: #f8f9fa;
        padding: 0.125rem 0.25rem;
        border-radius: 0.25rem;
        font-size: 0.875em;
    }
    
    .markdown-content blockquote {
        border-left: 4px solid #007bff;
        padding-left: 1rem;
        margin-left: 0;
        color: #6c757d;
    }
    
    .markdown-content table {
        width: 100%;
        margin-bottom: 1rem;
        border-collapse: collapse;
    }
    
    .markdown-content th, .markdown-content td {
        padding: 0.75rem;
        vertical-align: top;
        border: 1px solid #dee2e6;
    }
    
    .markdown-content th {
        background-color: #f8f9fa;
        font-weight: bold;
    }
    }
    
    .toc {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 0.375rem;
        padding: 1rem;
        max-height: 300px;
        overflow-y: auto;
        position: sticky;
        top: 20px;
    }
    
    .toc ul {
        list-style: none;
        padding-left: 0;
    }
    
    .toc ul ul {
        padding-left: 1rem;
    }
    
    .toc a {
        text-decoration: none;
        color: #495057;
        display: block;
        padding: 0.25rem 0;
        border-radius: 0.25rem;
    }
    
    .toc a:hover {
        background-color: #e9ecef;
        color: #007bff;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3">
                    <i class="fas fa-file-alt me-3"></i>{{ title }}
                </h1>
                <div>
                    <a href="{{ url_for('documentation_index') }}" class="btn btn-outline-secondary me-2">
                        <i class="fas fa-list me-2"></i>All Docs
                    </a>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-primary">
                        <i class="fas fa-home me-2"></i>Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-3 d-none d-lg-block">
            <div class="toc">
                <h6 class="fw-bold mb-3">
                    <i class="fas fa-list me-2"></i>Table of Contents
                </h6>
                <div id="toc-content">
                    <!-- TOC will be generated by JavaScript -->
                </div>
            </div>
        </div>
        
        <div class="col-lg-9">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <small class="text-muted">
                            <i class="fas fa-file me-1"></i>{{ filename }}
                        </small>
                        <button class="btn btn-sm btn-outline-secondary" onclick="toggleRawView()">
                            <i class="fas fa-code me-1"></i>
                            <span id="view-toggle">Raw</span>
                        </button>
                    </div>
                    
                    <div id="markdown-content" class="markdown-content">
                        <!-- Rendered markdown will appear here -->
                    </div>
                    
                    <div id="raw-content" class="d-none">
                        <pre><code>{{ content }}</code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Markdown content to render
const markdownContent = {{ content | tojsonfilter }};

// Configure marked options
marked.setOptions({
    highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
    },
    breaks: true,
    gfm: true
});

// Render markdown
document.addEventListener('DOMContentLoaded', function() {
    const contentDiv = document.getElementById('markdown-content');
    contentDiv.innerHTML = marked.parse(markdownContent);
    
    // Generate table of contents
    generateTOC();
    
    // Initialize syntax highlighting
    hljs.highlightAll();
});

function generateTOC() {
    const headings = document.querySelectorAll('#markdown-content h1, #markdown-content h2, #markdown-content h3, #markdown-content h4');
    const tocContent = document.getElementById('toc-content');
    
    if (headings.length === 0) {
        tocContent.innerHTML = '<p class="text-muted small">No headings found</p>';
        return;
    }
    
    let tocHTML = '<ul>';
    let lastLevel = 0;
    
    headings.forEach((heading, index) => {
        const level = parseInt(heading.tagName.charAt(1));
        const text = heading.textContent;
        const id = 'heading-' + index;
        heading.id = id;
        
        if (level > lastLevel) {
            for (let i = lastLevel; i < level - 1; i++) {
                tocHTML += '<ul>';
            }
            if (lastLevel > 0) tocHTML += '<ul>';
        } else if (level < lastLevel) {
            for (let i = level; i < lastLevel; i++) {
                tocHTML += '</ul>';
            }
        }
        
        tocHTML += `<li><a href="#${id}">${text}</a></li>`;
        lastLevel = level;
    });
    
    // Close remaining ul tags
    for (let i = 0; i < lastLevel; i++) {
        tocHTML += '</ul>';
    }
    
    tocContent.innerHTML = tocHTML;
    
    // Add smooth scrolling
    tocContent.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
}

function toggleRawView() {
    const markdownDiv = document.getElementById('markdown-content');
    const rawDiv = document.getElementById('raw-content');
    const toggleButton = document.getElementById('view-toggle');
    
    if (markdownDiv.classList.contains('d-none')) {
        // Show markdown view
        markdownDiv.classList.remove('d-none');
        rawDiv.classList.add('d-none');
        toggleButton.textContent = 'Raw';
    } else {
        // Show raw view
        markdownDiv.classList.add('d-none');
        rawDiv.classList.remove('d-none');
        toggleButton.textContent = 'Rendered';
    }
}
</script>
{% endblock %}
