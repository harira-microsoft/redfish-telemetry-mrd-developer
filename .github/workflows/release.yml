name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        python3 mrd_tool.py --help
        python3 -c "from app import app; print('Release validation passed')"
        
    - name: Create Release Archive
      run: |
        # Create clean release archive
        mkdir -p release/redfish-telemetry-mrd-developer
        
        # Copy essential files
        cp -r src/ release/redfish-telemetry-mrd-developer/
        cp -r templates/ release/redfish-telemetry-mrd-developer/
        cp -r config/ release/redfish-telemetry-mrd-developer/
        cp -r docs/ release/redfish-telemetry-mrd-developer/
        cp -r examples/ release/redfish-telemetry-mrd-developer/
        
        # Copy main files
        cp README.md LICENSE requirements.txt release/redfish-telemetry-mrd-developer/
        cp mrd_tool.py app.py release/redfish-telemetry-mrd-developer/
        
        # Create archive
        cd release
        tar -czf redfish-telemetry-mrd-developer-${{ github.ref_name }}.tar.gz redfish-telemetry-mrd-developer/
        zip -r redfish-telemetry-mrd-developer-${{ github.ref_name }}.zip redfish-telemetry-mrd-developer/
        
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          ## Redfish Telemetry MRD Developer Release ${{ github.ref_name }}
          
          ### Features
          - Generate Redfish MetricReportDefinition files from mockup data
          - Web interface for easy interaction
          - Comprehensive CLI with help system
          - Configuration system for customization
          - Built-in validation against Redfish schema
          
          ### Download
          - **Source Code**: Use the source code archives below
          - **Ready-to-use**: Download the release archives with all dependencies listed
          
          ### Quick Start
          ```bash
          # Extract the archive
          tar -xzf redfish-telemetry-mrd-developer-${{ github.ref_name }}.tar.gz
          cd redfish-telemetry-mrd-developer
          
          # Install dependencies
          pip install -r requirements.txt
          
          # Run the tool
          python3 mrd_tool.py --help
          python3 app.py  # for web interface
          ```
          
          ### Documentation
          Comprehensive documentation is available in the `docs/` directory and through the web interface.
          
        draft: false
        prerelease: false
        
    - name: Upload Release Archive (tar.gz)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/redfish-telemetry-mrd-developer-${{ github.ref_name }}.tar.gz
        asset_name: redfish-telemetry-mrd-developer-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip
        
    - name: Upload Release Archive (zip)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release/redfish-telemetry-mrd-developer-${{ github.ref_name }}.zip
        asset_name: redfish-telemetry-mrd-developer-${{ github.ref_name }}.zip
        asset_content_type: application/zip